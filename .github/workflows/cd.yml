# Delivery & Deployment Pipeline
# Triggered after successful completion of STRling CI workflow on main branch
# Deploys only when the repository is synchronized to the Python SSOT version
# Supports safe retries by skipping artifacts or tags that already exist

name: STRling CD
on:
    workflow_run:
        workflows: ["STRling CI"]
        branches: [main]
        types: [completed]
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Run deployment in dry-run mode"
                required: true
                default: true
                type: boolean
            tag_name:
                description: "Tag name to simulate"
                required: false
                default: ""

jobs:
    # ==========================================
    # TIER 1: GLOBAL PREFLIGHT GATE
    # ==========================================
    verify-release:
        name: Verify Release Conditions
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
        outputs:
            is_release: ${{ steps.release_state.outputs.is_release }}
            tag_version: ${{ steps.release_state.outputs.tag_version }}
            is_dry_run: ${{ steps.release_state.outputs.is_dry_run }}
            release_ref: ${{ steps.release_state.outputs.release_ref }}
        steps:
            - name: Checkout triggering commit
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
                  fetch-depth: 0

            - name: Setup Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Inject Apache 2.0 License
              run: curl -L -o LICENSE https://www.apache.org/licenses/LICENSE-2.0.txt

            - name: Verify SSOT release state
              id: release_state
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.dry_run }}" == "false" ]]; then
                    echo "is_dry_run=false" >> $GITHUB_OUTPUT
                  else
                    echo "is_dry_run=true" >> $GITHUB_OUTPUT
                  fi

                  REF="${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}"
                  echo "release_ref=$REF" >> $GITHUB_OUTPUT

                  python <<'PY'
                  import json, os, re, sys
                  import xml.etree.ElementTree as ET
                  from glob import glob
                  from pathlib import Path

                  try: import tomllib
                  except ModuleNotFoundError: import tomli as tomllib

                  def read_text(p): return Path(p).read_text(encoding='utf-8')
                  def require_match(l, p, t):
                      m = re.search(p, t, re.M)
                      if not m: raise RuntimeError(f"No version for {l}.")
                      return m.group(1).strip()

                  def normalize_version(v): return v.replace('-alpha', 'a0').replace('.alpha', 'a0').replace('alpha-', 'a')

                  # Extract versions
                  python_raw = tomllib.loads(read_text('bindings/python/pyproject.toml'))['project']['version']
                  ssot = normalize_version(python_raw)

                  lua_text = read_text(sorted(glob('bindings/lua/*.rockspec'))[0])
                  java_tree = ET.fromstring(read_text('bindings/java/pom.xml'))

                  # Fix for f-string backslash limitation in Python < 3.12
                  cpp_text = read_text('bindings/cpp/CMakeLists.txt')
                  cpp_base = require_match('C++', r'project\([\s\S]*?VERSION\s+([0-9\.]+)', cpp_text)
                  cpp_pre_match = re.search(r'STRLING_PRERELEASE_TAG\s+"([^"]+)"', cpp_text)
                  cpp_v = f"{cpp_base}-{cpp_pre_match.group(1)}" if cpp_pre_match else cpp_base

                  versions = {
                      'C': require_match('C', r'return\s+"([^"]+)";', read_text('bindings/c/src/strling.c')),
                      'C#': require_match('C#', r'<Version>([^<]+)</Version>', read_text('bindings/csharp/src/STRling/STRling.csproj')),
                      'C++': cpp_v,
                      'Dart': require_match('Dart', r'^version:\s*(.+)$', read_text('bindings/dart/pubspec.yaml')),
                      'F#': require_match('F#', r'<Version>([^<]+)</Version>', read_text('bindings/fsharp/src/STRling/STRling.fsproj')),
                      'Java': java_tree.findtext('{http://maven.apache.org/POM/4.0.0}version') or 'unknown',
                      'Kotlin': require_match('Kotlin', r'^version\s*=\s*"([^"]+)"', read_text('bindings/kotlin/build.gradle.kts')),
                      'Lua': require_match('Lua', r'^version\s*=\s*"([^"]+)"', lua_text).split('-')[0].replace('alpha', 'a0'),
                      'Perl': require_match('Perl', r"\$VERSION\s*=\s*'([^']+)'", read_text('bindings/perl/lib/STRling.pm')),
                      'PHP': json.loads(read_text('bindings/php/composer.json'))['version'],
                      'R': require_match('R', r'^Version:\s*(.+)$', read_text('bindings/r/DESCRIPTION')),
                      'Ruby': require_match('Ruby', r"spec\.version\s*=\s*'([^']+)'", read_text('bindings/ruby/strling.gemspec')).replace('.alpha', 'a0'),
                      'Rust': tomllib.loads(read_text('bindings/rust/Cargo.toml'))['package']['version'],
                      'TypeScript': json.loads(read_text('bindings/typescript/package.json'))['version'],
                  }

                  mismatches = [f"{b}: expected {ssot}, found {normalize_version(v)}" for b, v in versions.items() if normalize_version(v) != ssot]
                  if require_match('Lua tag', r'tag\s*=\s*"([^"]+)"', lua_text) != f"v{python_raw}":
                      mismatches.append("Lua tag mismatch")

                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f"tag_version={python_raw}\n")
                      f.write("is_release=false\n" if mismatches else "is_release=true\n")

                  if mismatches:
                      for m in mismatches: print(f"::error::{m}")
                      sys.exit(1)
                  PY

    # ==========================================
    # TIER 2: INDEPENDENT COMPILE TRACKS
    # ==========================================
    compile-c:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - run: make
              working-directory: bindings/c

    compile-cpp:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - run: cmake . && make
              working-directory: bindings/cpp

    compile-csharp:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-dotnet@v4
              with: { dotnet-version: "9.0" }
            - run: dotnet build -c Release
              working-directory: bindings/csharp

    compile-dart:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: dart-lang/setup-dart@v1
            - run: dart analyze
              working-directory: bindings/dart

    compile-fsharp:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-dotnet@v4
              with: { dotnet-version: "9.0" }
            - run: dotnet build src/STRling/STRling.fsproj -c Release
              working-directory: bindings/fsharp

    compile-go:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-go@v5
              with: { go-version: "1.21" }
            - run: go build ./...
              working-directory: bindings/go

    compile-java:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-java@v4
              with: { distribution: "temurin", java-version: "11" }
            - run: mvn compile
              working-directory: bindings/java

    compile-kotlin:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-java@v4
              with: { distribution: "temurin", java-version: "11" }
            - run: ./gradlew classes
              working-directory: bindings/kotlin

    compile-lua:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: leafo/gh-actions-lua@v12
            - uses: leafo/gh-actions-luarocks@v6
            - run: luarocks lint $(ls *.rockspec | head -n 1)
              working-directory: bindings/lua

    compile-perl:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: shogo82148/actions-setup-perl@v1
            - run: perl Makefile.PL && make
              working-directory: bindings/perl

    compile-php:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - run: composer validate
              working-directory: bindings/php

    compile-python:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-python@v5
              with: { python-version: "3.10" }
            - run: pip install build && python -m build
              working-directory: bindings/python

    compile-r:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - run: R CMD build .
              working-directory: bindings/r

    compile-ruby:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: ruby/setup-ruby@v1
              with: { ruby-version: "3.2" }
            - run: gem build strling.gemspec
              working-directory: bindings/ruby

    compile-rust:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: dtolnay/rust-toolchain@stable
            - run: cargo check
              working-directory: bindings/rust

    compile-swift:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - run: swift build
              working-directory: bindings/swift

    compile-typescript:
        needs: verify-release
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-node@v4
              with: { node-version: "22" }
            - run: npm ci && npm run build
              working-directory: bindings/typescript

    # ==========================================
    # TIER 3: INDEPENDENT PUBLISH TRACKS
    # ==========================================

    # --- Tag-Based Pushes ---
    publish-c:
        needs: [verify-release, compile-c]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - run: |
                  TAG="${{ needs.verify-release.outputs.tag_version }}"
                  FILE=$(grep 'return "' bindings/c/src/strling.c | cut -d '"' -f 2)
                  [[ "$TAG" == "$FILE" ]] || exit 1

    publish-go:
        needs: [verify-release, compile-go]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        permissions: { contents: write }
        steps:
            - uses: actions/checkout@v5
              with:
                  {
                      ref: "${{ needs.verify-release.outputs.release_ref }}",
                      fetch-depth: 0,
                  }
            - run: |
                  TAG="v${{ needs.verify-release.outputs.tag_version }}"
                  if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG$"; then exit 0; fi
                  git config user.name "github-actions[bot]" && git config user.email "bot@users.noreply.github.com"
                  git tag "$TAG"
                  [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]] || git push origin "refs/tags/$TAG"

    publish-php:
        needs: [verify-release, compile-php]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        permissions: { contents: write }
        steps:
            - uses: actions/checkout@v5
              with:
                  {
                      ref: "${{ needs.verify-release.outputs.release_ref }}",
                      fetch-depth: 0,
                  }
            - run: |
                  TAG="v${{ needs.verify-release.outputs.tag_version }}"
                  if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG$"; then exit 0; fi
                  git config user.name "github-actions[bot]" && git config user.email "bot@users.noreply.github.com"
                  git tag "$TAG"
                  [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]] || git push origin "refs/tags/$TAG"

    publish-r:
        needs: [verify-release, compile-r]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        permissions: { contents: write }
        steps:
            - uses: actions/checkout@v5
              with:
                  {
                      ref: "${{ needs.verify-release.outputs.release_ref }}",
                      fetch-depth: 0,
                  }
            - run: |
                  TAG="v${{ needs.verify-release.outputs.tag_version }}"
                  if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG$"; then exit 0; fi
                  git config user.name "github-actions[bot]" && git config user.email "bot@users.noreply.github.com"
                  git tag "$TAG"
                  [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]] || git push origin "refs/tags/$TAG"

    publish-swift:
        needs: [verify-release, compile-swift]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        permissions: { contents: write }
        steps:
            - uses: actions/checkout@v5
              with:
                  {
                      ref: "${{ needs.verify-release.outputs.release_ref }}",
                      fetch-depth: 0,
                  }
            - run: |
                  TAG="v${{ needs.verify-release.outputs.tag_version }}"
                  if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG$"; then exit 0; fi
                  git config user.name "github-actions[bot]" && git config user.email "bot@users.noreply.github.com"
                  git tag "$TAG"
                  [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]] || git push origin "refs/tags/$TAG"

    # --- Distributor Pushes ---
    publish-cpp:
        needs: [verify-release, compile-cpp]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - run: pip install conan
            - working-directory: bindings/cpp
              env:
                  CONAN_USERNAME: ${{ secrets.CONAN_USERNAME }}
                  CONAN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}
              run: |
                  # Conan version checking/upload logic
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    conan upload "*" --dry-run --remote conancenter
                  else
                    conan upload "*" --remote conancenter --force
                  fi

    publish-csharp:
        needs: [verify-release, compile-csharp]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-dotnet@v4
              with: { dotnet-version: "9.0" }
            - working-directory: bindings/csharp
              run: |
                  VER=$(grep "<Version>" src/STRling/STRling.csproj | sed -e 's/.*<Version>\(.*\)<\/Version>.*/\1/')
                  if python3 ../../tooling/check_version_exists.py --registry nuget --package "STRling" --version "$VER"; then exit 0; fi
                  dotnet pack -c Release
                  [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]] && exit 0
                  dotnet nuget push src/STRling/bin/Release/*.nupkg -k ${{ secrets.NUGET_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

    publish-dart:
        needs: [verify-release, compile-dart]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        permissions: { id-token: write }
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: dart-lang/setup-dart@v1
            - working-directory: bindings/dart
              run: |
                  VER=$(grep "^version:" pubspec.yaml | cut -d ' ' -f 2)
                  if python3 ../../tooling/check_version_exists.py --registry pub --package "strling" --version "$VER"; then exit 0; fi
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    dart pub publish --dry-run
                  else
                    dart pub publish --force
                  fi

    publish-fsharp:
        needs: [verify-release, compile-fsharp]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-dotnet@v4
              with: { dotnet-version: "9.0" }
            - working-directory: bindings/fsharp
              run: |
                  VER=$(grep "<Version>" src/STRling/STRling.fsproj | sed -e 's/.*<Version>\(.*\)<\/Version>.*/\1/')
                  if python3 ../../tooling/check_version_exists.py --registry nuget --package "STRling.FSharp" --version "$VER"; then exit 0; fi
                  dotnet pack src/STRling/STRling.fsproj -c Release
                  [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]] && exit 0
                  dotnet nuget push src/STRling/bin/Release/*.nupkg -k ${{ secrets.NUGET_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

    publish-java:
        needs: [verify-release, compile-java]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-java@v4
              with: { distribution: "temurin", java-version: "11" }
            - working-directory: bindings/java
              env:
                  MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
                  GPG_KEY: ${{ secrets.GPG_KEY }}
              run: |
                  VER=$(grep '<version>' pom.xml | head -1 | sed -e 's/.*<version>\(.*\)<\/version>.*/\1/')
                  if python3 ../../tooling/check_version_exists.py --registry maven --group "com.strling" --package "strling" --version "$VER"; then exit 0; fi
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    mvn deploy -DskipTests -Dgpg.skip=true -Dmaven.deploy.skip=true
                  else
                    mvn deploy -DskipTests -Dgpg.passphrase="${GPG_KEY}"
                  fi

    publish-kotlin:
        needs: [verify-release, compile-kotlin]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-java@v4
              with: { distribution: "temurin", java-version: "11" }
            - working-directory: bindings/kotlin
              env:
                  MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
                  ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_KEY }}
              run: |
                  VER=$(grep "version =" build.gradle.kts | head -1 | cut -d '"' -f 2)
                  if python3 ../../tooling/check_version_exists.py --registry maven --group "com.strling" --package "strling-kotlin" --version "$VER"; then exit 0; fi
                  [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]] && ./gradlew publishToMavenLocal && exit 0
                  ./gradlew publish

    publish-lua:
        needs: [verify-release, compile-lua]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: leafo/gh-actions-lua@v12
            - uses: leafo/gh-actions-luarocks@v6
            - working-directory: bindings/lua
              env:
                  LUAROCKS_API_KEY: ${{ secrets.LUA_API_KEY }}
              run: |
                  SPEC=$(ls strling-*.rockspec | head -n 1)
                  VER=$(grep "^version =" "$SPEC" | cut -d '"' -f 2)
                  if python3 ../../tooling/check_version_exists.py --registry luarocks --package "strling" --version "$VER"; then exit 0; fi
                  [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]] && exit 0
                  luarocks upload "$SPEC" --api-key=${LUAROCKS_API_KEY}

    publish-perl:
        needs: [verify-release, compile-perl]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: shogo82148/actions-setup-perl@v1
            - run: cpanm App::cpanupload
            - working-directory: bindings/perl
              env:
                  PAUSE_USERNAME: ${{ secrets.PAUSE_USERNAME }}
                  PAUSE_PASSWORD: ${{ secrets.PAUSE_PASSWORD }}
              run: |
                  VER=$(grep "\$VERSION =" lib/STRling.pm | cut -d "'" -f 2)
                  if python3 ../../tooling/check_version_exists.py --registry cpan --package "STRling" --version "$VER"; then exit 0; fi
                  perl Makefile.PL && make dist
                  [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]] && exit 0
                  cpan-upload -u $PAUSE_USERNAME -p $PAUSE_PASSWORD *.tar.gz

    publish-python:
        needs: [verify-release, compile-python]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        permissions: { id-token: write, contents: read }
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-python@v5
              with: { python-version: "3.10" }
            - working-directory: bindings/python
              id: prepare
              run: |
                  pip install build twine tomli
                  VER=$(python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])")
                  if python ../../tooling/check_version_exists.py --registry pypi --package "STRling" --version "$VER"; then
                    echo "publish=false" >> $GITHUB_OUTPUT
                    echo "Version already exists in PyPI; skipping upload."
                    exit 0
                  fi

                  python -m build

                  if [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]]; then
                    echo "publish=false" >> $GITHUB_OUTPUT
                    echo "Dry run enabled; PyPI upload skipped."
                    exit 0
                  fi

                  echo "publish=true" >> $GITHUB_OUTPUT
            - if: steps.prepare.outputs.publish == 'true'
              uses: pypa/gh-action-pypi-publish@release/v1
              with: { packages-dir: bindings/python/dist/ }

    publish-ruby:
        needs: [verify-release, compile-ruby]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        permissions: { id-token: write }
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: ruby/setup-ruby@v1
              with: { ruby-version: "3.2" }
            - working-directory: bindings/ruby
              env:
                  GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_KEY }}
              run: |
                  VER=$(grep "spec.version =" strling.gemspec | cut -d "'" -f 2)
                  if python3 ../../tooling/check_version_exists.py --registry rubygems --package "strling" --version "$VER"; then exit 0; fi
                  gem build strling.gemspec
                  [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]] && exit 0
                  mkdir -p ~/.gem && echo -e "---\n:rubygems_api_key: ${GEM_HOST_API_KEY}" > ~/.gem/credentials && chmod 0600 ~/.gem/credentials
                  gem push *.gem

    publish-rust:
        needs: [verify-release, compile-rust]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: dtolnay/rust-toolchain@stable
            - working-directory: bindings/rust
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
              run: |
                  VER=$(grep "^version" Cargo.toml | head -n 1 | cut -d '"' -f 2)
                  if python3 ../../tooling/check_version_exists.py --registry crates --package "strling" --version "$VER"; then exit 0; fi
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    cargo publish --dry-run
                  else
                    cargo publish
                  fi

    publish-typescript:
        needs: [verify-release, compile-typescript]
        if: needs.verify-release.outputs.is_release == 'true'
        runs-on: ubuntu-latest
        permissions: { id-token: write, contents: read }
        steps:
            - uses: actions/checkout@v5
              with: { ref: "${{ needs.verify-release.outputs.release_ref }}" }
            - uses: actions/setup-node@v4
              with:
                  {
                      node-version: "22",
                      registry-url: "https://registry.npmjs.org",
                  }
            - working-directory: bindings/typescript
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  VER=$(node -pe "require('./package.json').version")
                  if python ../../tooling/check_version_exists.py --registry npm --package "@strling-lang/strling" --version "$VER"; then exit 0; fi
                  npm ci && npm run build
                  TAG="latest"
                  [[ "$VER" == *-* ]] && TAG="${VER#*-}"
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    npm publish --dry-run --access public --tag "$TAG"
                  else
                    npm publish --access public --tag "$TAG"
                  fi

    # ==========================================
    # TIER 4: VALIDATION ANCHOR (BLIND INSTALLS)
    # ==========================================

    verify-conan-distributor:
        needs: [verify-release, publish-cpp, publish-typescript]
        if: needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.publish-cpp.result == 'success' && needs.publish-typescript.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/setup-python@v5
              with: { python-version: "3.11" }
            - shell: bash
              run: |
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  python -m pip install conan >/dev/null
                  for attempt in 1 2 3; do
                    SEARCH=$(conan search "strling/*" -r conancenter 2>/tmp/conan.log) || true
                    INSTALLED=$(printf '%s\n' "$SEARCH" | sed -n 's/.*strling\/\([^ #]*\).*/\1/p' | sort -V | tail -n 1)
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then exit 0; fi
                    [[ "$attempt" -lt 3 ]] && sleep 100
                  done
                  exit 1

    verify-cpan-distributor:
        needs: [verify-release, publish-perl, publish-typescript]
        if: needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.publish-perl.result == 'success' && needs.publish-typescript.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: shogo82148/actions-setup-perl@v1
            - shell: bash
              run: |
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  for attempt in 1 2 3; do
                    cpanm --notest STRling >/dev/null 2>&1 || true
                    INSTALLED=$(perl -MSTRling -e 'print $STRling::VERSION' 2>/dev/null || echo "")
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then exit 0; fi
                    [[ "$attempt" -lt 3 ]] && sleep 100
                  done
                  exit 1

    verify-crates-distributor:
        needs: [verify-release, publish-rust, publish-typescript]
        if: needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.publish-rust.result == 'success' && needs.publish-typescript.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: dtolnay/rust-toolchain@stable
            - shell: bash
              run: |
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  for attempt in 1 2 3; do
                    cargo install strling --dry-run >/tmp/crates.log 2>&1 || true
                    INSTALLED=$(cargo search strling --limit 1 | sed -n 's/^strling = "\([^"]*\)".*/\1/p')
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then exit 0; fi
                    [[ "$attempt" -lt 3 ]] && sleep 100
                  done
                  exit 1

    verify-gems-distributor:
        needs: [verify-release, publish-ruby, publish-typescript]
        if: needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.publish-ruby.result == 'success' && needs.publish-typescript.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: ruby/setup-ruby@v1
              with: { ruby-version: "3.2" }
            - shell: bash
              run: |
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  for attempt in 1 2 3; do
                    gem install strling --no-document >/dev/null 2>&1 || true
                    INSTALLED=$(ruby -e "begin; puts Gem::Specification.find_by_name('strling').version; rescue; end")
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then exit 0; fi
                    [[ "$attempt" -lt 3 ]] && sleep 100
                  done
                  exit 1

    verify-luarocks-distributor:
        needs: [verify-release, publish-lua, publish-typescript]
        if: needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.publish-lua.result == 'success' && needs.publish-typescript.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: leafo/gh-actions-lua@v12
            - uses: leafo/gh-actions-luarocks@v6
            - shell: bash
              run: |
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  for attempt in 1 2 3; do
                    luarocks install strling >/dev/null 2>&1 || true
                    ROCK_VERSION=$(luarocks show strling 2>/dev/null | awk 'NR==1 {print $2}')
                    INSTALLED=$(printf '%s\n' "$ROCK_VERSION" | sed -E 's/-[0-9]+$//')
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then exit 0; fi
                    [[ "$attempt" -lt 3 ]] && sleep 100
                  done
                  exit 1

    verify-maven-distributor:
        needs:
            [verify-release, publish-java, publish-kotlin, publish-typescript]
        if: needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.publish-java.result == 'success' && needs.publish-kotlin.result == 'success' && needs.publish-typescript.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - shell: bash
              run: |
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  for attempt in 1 2 3; do
                    JAVA_VER=$(curl -fsSL "https://repo1.maven.org/maven2/com/strling/strling/maven-metadata.xml" | sed -n 's:.*<release>\([^<]*\)</release>.*:\1:p')
                    KOTLIN_VER=$(curl -fsSL "https://repo1.maven.org/maven2/com/strling/strling-kotlin/maven-metadata.xml" | sed -n 's:.*<release>\([^<]*\)</release>.*:\1:p')
                    if [[ "$JAVA_VER" == "$EXPECTED" && "$KOTLIN_VER" == "$EXPECTED" ]]; then exit 0; fi
                    [[ "$attempt" -lt 3 ]] && sleep 100
                  done
                  exit 1

    verify-nuget-distributor:
        needs:
            [verify-release, publish-csharp, publish-fsharp, publish-typescript]
        if: needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.publish-csharp.result == 'success' && needs.publish-fsharp.result == 'success' && needs.publish-typescript.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/setup-dotnet@v4
              with: { dotnet-version: "9.0" }
            - shell: bash
              run: |
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  for attempt in 1 2 3; do
                    CSHARP_DIR=$(mktemp -d) && pushd "$CSHARP_DIR" >/dev/null
                    dotnet new console --force >/dev/null && dotnet add package STRling >/dev/null 2>&1 || true
                    CS=$(dotnet list package | awk '$2=="STRling" {print $NF; exit}')
                    popd >/dev/null

                    FSHARP_DIR=$(mktemp -d) && pushd "$FSHARP_DIR" >/dev/null
                    dotnet new console -lang F# --force >/dev/null && dotnet add package STRling.FSharp >/dev/null 2>&1 || true
                    FS=$(dotnet list package | awk '$2=="STRling.FSharp" {print $NF; exit}')
                    popd >/dev/null

                    if [[ "$CS" == "$EXPECTED" && "$FS" == "$EXPECTED" ]]; then exit 0; fi
                    [[ "$attempt" -lt 3 ]] && sleep 100
                  done
                  exit 1

    verify-pub-distributor:
        needs: [verify-release, publish-dart, publish-typescript]
        if: needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.publish-dart.result == 'success' && needs.publish-typescript.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: dart-lang/setup-dart@v1
            - shell: bash
              run: |
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  for attempt in 1 2 3; do
                    WORKDIR=$(mktemp -d)
                    dart create --force --template=console-simple "$WORKDIR/app" >/dev/null
                    pushd "$WORKDIR/app" >/dev/null
                    dart pub add strling >/dev/null 2>&1 || true
                    INSTALLED=$(awk '/^  strling:$/ {in_pkg=1; next} in_pkg && /version:/ {gsub(/"/, "", $2); print $2; exit}' pubspec.lock)
                    popd >/dev/null
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then exit 0; fi
                    [[ "$attempt" -lt 3 ]] && sleep 100
                  done
                  exit 1

    verify-pypi-distributor:
        needs: [verify-release, publish-python, publish-typescript]
        if: needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.publish-python.result == 'success' && needs.publish-typescript.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/setup-python@v5
              with: { python-version: "3.10" }
            - shell: bash
              run: |
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  for attempt in 1 2 3; do
                    WORKDIR=$(mktemp -d) && python -m venv "$WORKDIR/.venv" && source "$WORKDIR/.venv/bin/activate"
                    pip install strling >/dev/null 2>&1 || true
                    INSTALLED=$(pip show strling 2>/dev/null | awk -F': ' '/^Version:/{print $2; exit}')
                    deactivate
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then exit 0; fi
                    [[ "$attempt" -lt 3 ]] && sleep 100
                  done
                  exit 1

    verify-typescript-distributor:
        needs: [verify-release, publish-typescript]
        if: needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.publish-typescript.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/setup-node@v4
              with: { node-version: "22" }
            - shell: bash
              run: |
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  for attempt in 1 2 3; do
                    WORKDIR=$(mktemp -d) && pushd "$WORKDIR" >/dev/null
                    npm init -y >/dev/null 2>&1 && npm install @strling-lang/strling >/dev/null 2>&1 || true
                    INSTALLED=$(node -p "require('./node_modules/@strling-lang/strling/package.json').version" 2>/dev/null || echo "")
                    popd >/dev/null
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then exit 0; fi
                    [[ "$attempt" -lt 3 ]] && sleep 100
                  done
                  exit 1
