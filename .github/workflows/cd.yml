# Delivery & Deployment Pipeline
# Triggered after successful completion of STRling CI workflow on main branch
# Deploys only when the repository is synchronized to the Python SSOT version
# Supports safe retries by skipping artifacts or tags that already exist

name: STRling CD
on:
    workflow_run:
        workflows: ["STRling CI"]
        branches: [main] # CD only triggers for main branch CI runs
        types:
            - completed
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Run deployment in dry-run mode (no actual publishing)"
                required: true
                default: true
                type: boolean
            tag_name:
                description: "Tag name to simulate (e.g. v3.0.0-alpha)"
                required: false
                default: ""

jobs:
    # --- GATE JOB: Verify conditions before proceeding ---
    verify-release:
        name: Verify Release Conditions
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
        outputs:
            is_release: ${{ steps.release_state.outputs.is_release }}
            tag_version: ${{ steps.release_state.outputs.tag_version }}
            is_dry_run: ${{ steps.release_state.outputs.is_dry_run }}
            release_ref: ${{ steps.release_state.outputs.release_ref }}
        steps:
            - name: Checkout triggering commit
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
                  fetch-depth: 0

            - name: Setup Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Inject Apache 2.0 License for Registry Compliance
              run: |
                  curl -L -o LICENSE https://www.apache.org/licenses/LICENSE-2.0.txt

            - name: Verify SSOT release state
              id: release_state
              env:
                  DISPATCH_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || '' }}
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    if [[ "${{ github.event.inputs.dry_run }}" == "false" ]]; then
                      echo "is_dry_run=false" >> $GITHUB_OUTPUT
                    else
                      echo "is_dry_run=true" >> $GITHUB_OUTPUT
                    fi
                  else
                    echo "is_dry_run=false" >> $GITHUB_OUTPUT
                  fi

                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    RELEASE_REF="${{ github.sha }}"
                  else
                    RELEASE_REF="${{ github.event.workflow_run.head_sha }}"
                  fi

                  echo "release_ref=$RELEASE_REF" >> $GITHUB_OUTPUT
                  python <<'PY'
                  import json
                  import os
                  import re
                  import sys
                  import xml.etree.ElementTree as ET
                  from glob import glob
                  from pathlib import Path

                  try:
                      import tomllib
                  except ModuleNotFoundError:
                      import tomli as tomllib

                  root = Path('.')

                  def read_text(relative_path: str) -> str:
                      return (root / relative_path).read_text(encoding='utf-8')

                  def parse_toml(relative_path: str):
                      return tomllib.loads(read_text(relative_path))

                  def require_match(label: str, pattern: str, text: str) -> str:
                      match = re.search(pattern, text, re.MULTILINE)
                      if not match:
                          raise RuntimeError(f"Could not determine version for {label}.")
                      return match.group(1).strip()

                  def optional_match(pattern: str, text: str) -> str | None:
                      match = re.search(pattern, text, re.MULTILINE)
                      if not match:
                          return None
                      return match.group(1).strip()

                  def normalize_version(version: str) -> str:
                      return (
                          version.replace('-alpha', 'a0')
                          .replace('.alpha', 'a0')
                          .replace('alpha-', 'a')
                      )

                  python_raw = parse_toml('bindings/python/pyproject.toml')['project']['version']
                  python_ssot = normalize_version(python_raw)
                  expected_tag = f"v{python_raw}"

                  typescript_version = json.loads(read_text('bindings/typescript/package.json'))['version']
                  rust_version = parse_toml('bindings/rust/Cargo.toml')['package']['version']
                  dart_version = require_match('Dart', r'^version:\s*(.+)$', read_text('bindings/dart/pubspec.yaml'))
                  csharp_version = require_match('C#', r'<Version>([^<]+)</Version>', read_text('bindings/csharp/src/STRling/STRling.csproj'))
                  fsharp_version = require_match('F#', r'<Version>([^<]+)</Version>', read_text('bindings/fsharp/src/STRling/STRling.fsproj'))

                  java_tree = ET.fromstring(read_text('bindings/java/pom.xml'))
                  java_ns = {'m': 'http://maven.apache.org/POM/4.0.0'}
                  java_version = java_tree.findtext('m:version', namespaces=java_ns)

                  kotlin_version = require_match('Kotlin', r'^version\s*=\s*"([^"]+)"', read_text('bindings/kotlin/build.gradle.kts'))
                  ruby_raw = require_match('Ruby', r"spec\.version\s*=\s*'([^']+)'", read_text('bindings/ruby/strling.gemspec'))

                  lua_candidates = sorted(glob('bindings/lua/*.rockspec'))
                  lua_text = read_text(lua_candidates[0])
                  lua_raw = require_match('Lua', r'^version\s*=\s*"([^"]+)"', lua_text)
                  lua_tag = require_match('Lua tag', r'tag\s*=\s*"([^"]+)"', lua_text)

                  perl_version = require_match('Perl', r"\$VERSION\s*=\s*'([^']+)'", read_text('bindings/perl/lib/STRling.pm'))
                  php_version = json.loads(read_text('bindings/php/composer.json'))['version']
                  r_version = require_match('R', r'^Version:\s*(.+)$', read_text('bindings/r/DESCRIPTION'))

                  cpp_text = read_text('bindings/cpp/CMakeLists.txt')
                  cpp_base = require_match('C++', r'VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)', cpp_text)
                  cpp_pre = optional_match(r'STRLING_PRERELEASE_TAG\s+"([^"]+)"', cpp_text)
                  cpp_version = f"{cpp_base}-{cpp_pre}" if cpp_pre else cpp_base
                  c_version = require_match('C', r'return\s+"([^"]+)";', read_text('bindings/c/src/strling.c'))

                  versions = {
                      'C': c_version,
                      'C#': csharp_version,
                      'C++': cpp_version,
                      'Dart': dart_version,
                      'F#': fsharp_version,
                      'Java': java_version.strip() if java_version else 'unknown',
                      'Kotlin': kotlin_version,
                      'Lua': lua_raw.split('-')[0].replace('alpha', 'a0'),
                      'Perl': perl_version,
                      'PHP': php_version,
                      'R': r_version,
                      'Ruby': ruby_raw.replace('.alpha', 'a0'),
                      'Rust': rust_version,
                      'TypeScript': typescript_version,
                  }

                  mismatches = []
                  for binding, actual in versions.items():
                      if normalize_version(actual) != python_ssot:
                          mismatches.append(f"{binding}: expected {python_raw}, found {actual}")

                  if lua_tag != expected_tag:
                      mismatches.append(f"Lua tag: expected {expected_tag}, found {lua_tag}")

                  with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
                      output.write(f"tag_version={python_raw}\n")
                      if mismatches:
                          output.write('is_release=false\n')
                      else:
                          output.write('is_release=true\n')

                  if mismatches:
                      for mismatch in mismatches:
                          print(f"::error::{mismatch}")
                      sys.exit(1)

                  print('All release versions are synchronized to the Python SSOT.')
                  PY

    # --- AUTHENTICATION SMOKE TESTS (MATRIX) ---
    verify-connections:
        name: Verify Registry Auth (${{ matrix.binding }})
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - binding: typescript
                      environment: npmjs
                      working_directory: bindings/typescript
                    - binding: python
                      environment: pypi
                      working_directory: bindings/python
                    - binding: rust
                      environment: crates-io
                      working_directory: bindings/rust
                    - binding: dart
                      environment: pubdev
                      working_directory: bindings/dart
                    - binding: ruby
                      environment: rubygems
                      working_directory: bindings/ruby
                    - binding: csharp
                      environment: nuget
                      working_directory: bindings/csharp
                    - binding: fsharp
                      environment: nuget
                      working_directory: bindings/fsharp
                    - binding: java
                      environment: maven-central
                      working_directory: bindings/java
                    - binding: kotlin
                      environment: maven-central
                      working_directory: bindings/kotlin
                    - binding: lua
                      environment: luarocks
                      working_directory: bindings/lua
                    - binding: php
                      environment: packagist
                      working_directory: bindings/php
                    - binding: go
                      environment: github-tags
                      working_directory: bindings/go
                    - binding: swift
                      environment: github-tags
                      working_directory: bindings/swift
                    - binding: cpp
                      environment: conan
                      working_directory: bindings/cpp
                    - binding: perl
                      environment: cpan
                      working_directory: bindings/perl
                    - binding: c
                      environment: source-distribution
                      working_directory: bindings/c
        permissions:
            contents: write
            id-token: write
        environment:
            name: ${{ matrix.environment }}
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
                  fetch-depth: 0

            - name: Setup Node.js 22
              if: ${{ matrix.binding == 'typescript' }}
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  registry-url: "https://registry.npmjs.org"

            - name: Setup Python 3.10
              if: ${{ matrix.binding == 'python' }}
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Setup Rust
              if: ${{ matrix.binding == 'rust' }}
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: "1.65"

            - name: Setup Dart
              if: ${{ matrix.binding == 'dart' }}
              uses: dart-lang/setup-dart@v1

            - name: Setup Ruby
              if: ${{ matrix.binding == 'ruby' }}
              uses: ruby/setup-ruby@v1
              with:
                  ruby-version: "3.2"

            - name: Setup .NET
              if: ${{ matrix.binding == 'csharp' || matrix.binding == 'fsharp' }}
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0"

            - name: Setup Java
              if: ${{ matrix.binding == 'java' || matrix.binding == 'kotlin' }}
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "11"

            - name: Setup Lua
              if: ${{ matrix.binding == 'lua' }}
              uses: leafo/gh-actions-lua@v12

            - name: Setup LuaRocks
              if: ${{ matrix.binding == 'lua' }}
              uses: leafo/gh-actions-luarocks@v6

            - name: Setup Perl
              if: ${{ matrix.binding == 'perl' }}
              uses: shogo82148/actions-setup-perl@v1

            - name: Prepare Conan
              if: ${{ matrix.binding == 'cpp' }}
              run: python3 -m pip install --upgrade pip conan

            - name: Build Python package
              if: ${{ matrix.binding == 'python' }}
              working-directory: bindings/python
              run: |
                  python -m pip install --upgrade pip build
                  python -m build

            - name: Publish Python package to PyPI
              if: ${{ matrix.binding == 'python' }}
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: bindings/python/dist/
                  repository-url: https://test.pypi.org/legacy/

            - name: Run Authentication Smoke Test
              if: ${{ matrix.binding != 'python' }}
              working-directory: ${{ matrix.working_directory }}
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
                  GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_KEY }}
                  MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
                  GPG_KEY: ${{ secrets.GPG_KEY }}
                  LUAROCKS_API_KEY: ${{ secrets.LUA_API_KEY }}
                  PAUSE_USERNAME: ${{ secrets.PAUSE_USERNAME }}
                  PAUSE_PASSWORD: ${{ secrets.PAUSE_PASSWORD }}
                  CONAN_REMOTE_USERNAME: ${{ secrets.CONAN_USERNAME }}
                  CONAN_REMOTE_PASSWORD: ${{ secrets.CONAN_PASSWORD }}
              run: |
                  case "${{ matrix.binding }}" in
                    typescript)
                      npm ci
                      npm run build
                      CURRENT_VERSION=$(node -pe "require('./package.json').version")
                      PUBLISH_TAG="latest"
                      if [[ "$CURRENT_VERSION" == *-* ]]; then
                        PUBLISH_TAG="${CURRENT_VERSION#*-}"
                      fi
                      npm publish --dry-run --access public --tag "$PUBLISH_TAG"
                      ;;
                    rust)
                      cargo publish --dry-run
                      ;;
                    dart)
                      dart pub publish --dry-run
                      ;;
                    ruby)
                      gem build strling.gemspec
                      echo "DRY RUN: gem push *.gem"
                      ;;
                    csharp)
                      dotnet pack --configuration Release
                      echo "DRY RUN: dotnet nuget push src/STRling/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json"
                      ;;
                    fsharp)
                      dotnet pack src/STRling/STRling.fsproj --configuration Release
                      echo "DRY RUN: dotnet nuget push src/STRling/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json"
                      ;;
                    java)
                      mvn deploy -DskipTests -Dgpg.skip=true -Dmaven.deploy.skip=true
                      ;;
                    kotlin)
                      ./gradlew publishToMavenLocal
                      ;;
                    lua)
                      ROCKSPEC=$(ls strling-*.rockspec | head -n 1)
                      luarocks build --rockspec "$ROCKSPEC"
                      ;;
                    php|go|swift)
                      TAG_VERSION="${{ needs.verify-release.outputs.tag_version }}"
                      AUDIT_TAG="v${TAG_VERSION}-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.binding }}-auth-check"
                      git push --dry-run origin "HEAD:refs/tags/$AUDIT_TAG"
                      ;;
                    cpp)
                      conan upload "*" --dry-run --remote conancenter
                      ;;
                    perl)
                      perl Makefile.PL
                      make dist
                      echo "DRY RUN: cpan-upload -u $PAUSE_USERNAME *.tar.gz"
                      ;;
                    c)
                      make
                      ;;
                    *)
                      echo "Unknown binding: ${{ matrix.binding }}"
                      exit 1
                      ;;
                  esac

    # --- DEPLOYMENT JOBS (ALPHABETICALLY ORDERED) ---

    deploy-c:
        name: Deploy C (Tag Validation)
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - name: Verify Version Match
              working-directory: bindings/c
              run: |
                  TAG_VERSION="${{ needs.verify-release.outputs.tag_version }}"
                  # Extract version from src/strling.c: return "3.0.0-alpha";
                  FILE_VERSION=$(grep 'return "' src/strling.c | cut -d '"' -f 2)
                  echo "Tag: $TAG_VERSION"
                  echo "File: $FILE_VERSION"
                  if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
                    echo "Version mismatch!"
                    exit 1
                  fi

    deploy-cpp:
        name: Deploy C++ (Tag Validation)
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - name: Verify Version Match
              working-directory: bindings/cpp
              run: |
                  TAG_VERSION="${{ needs.verify-release.outputs.tag_version }}"
                  # Extract version from CMakeLists.txt: VERSION 3.0.0
                  FILE_VERSION=$(grep "VERSION [0-9]" CMakeLists.txt | awk '{print $2}')
                  echo "Tag: $TAG_VERSION"
                  echo "File: $FILE_VERSION"
                  # Note: CMake often uses just X.Y.Z, while tag might be X.Y.Z-alpha.
                  # We'll do a simple prefix check or exact match if possible.
                  if [[ "$TAG_VERSION" != "$FILE_VERSION"* ]]; then
                     echo "Version mismatch! (Expected $FILE_VERSION to be part of $TAG_VERSION)"
                     exit 1
                  fi

    deploy-csharp:
        name: Deploy C# to NuGet
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0"
            - name: Check NuGet registry
              id: check_nuget
              working-directory: bindings/csharp
              run: |
                  VERSION=$(grep "<Version>" src/STRling/STRling.csproj | sed -e 's/.*<Version>\(.*\)<\/Version>.*/\1/')
                  if python3 ../../tooling/check_version_exists.py --registry nuget --package "STRling" --version "$VERSION"; then
                     echo "exists=true" >> $GITHUB_OUTPUT
                     echo "Version $VERSION already exists on NuGet. Skipping publish."
                  else
                     echo "exists=false" >> $GITHUB_OUTPUT
                     echo "Version $VERSION not found on NuGet. Proceeding to publish."
                  fi
            - name: Pack
              if: steps.check_nuget.outputs.exists == 'false'
              working-directory: bindings/csharp
              run: dotnet pack --configuration Release
            - name: Push to NuGet
              if: steps.check_nuget.outputs.exists == 'false'
              working-directory: bindings/csharp
              run: |
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    echo "DRY RUN: dotnet nuget push src/STRling/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json"
                  else
                    dotnet nuget push src/STRling/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_KEY }} --source https://api.nuget.org/v3/index.json
                  fi

    deploy-dart:
        name: Deploy Dart to Pub.dev
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        permissions:
            id-token: write
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - uses: dart-lang/setup-dart@v1
            - name: Check Pub.dev registry
              id: check_pub
              working-directory: bindings/dart
              run: |
                  VERSION=$(grep "^version:" pubspec.yaml | cut -d ' ' -f 2)
                  if python3 ../../tooling/check_version_exists.py --registry pub --package "strling" --version "$VERSION"; then
                     echo "exists=true" >> $GITHUB_OUTPUT
                     echo "Version $VERSION already exists on Pub.dev. Skipping publish."
                  else
                     echo "exists=false" >> $GITHUB_OUTPUT
                     echo "Version $VERSION not found on Pub.dev. Proceeding to publish."
                  fi
            - name: Publish to Pub.dev
              if: steps.check_pub.outputs.exists == 'false'
              working-directory: bindings/dart
              run: |
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    dart pub publish --dry-run
                  else
                    dart pub publish --force
                  fi

    deploy-fsharp:
        name: Deploy F# to NuGet
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0"
            - name: Check NuGet registry
              id: check_nuget_fs
              working-directory: bindings/fsharp
              run: |
                  VERSION=$(grep "<Version>" src/STRling/STRling.fsproj | sed -e 's/.*<Version>\(.*\)<\/Version>.*/\1/')
                  if python3 ../../tooling/check_version_exists.py --registry nuget --package "STRling.FSharp" --version "$VERSION"; then
                     echo "exists=true" >> $GITHUB_OUTPUT
                     echo "Version $VERSION already exists on NuGet. Skipping publish."
                  else
                     echo "exists=false" >> $GITHUB_OUTPUT
                     echo "Version $VERSION not found on NuGet. Proceeding to publish."
                  fi
            - name: Pack
              if: steps.check_nuget_fs.outputs.exists == 'false'
              working-directory: bindings/fsharp
              run: dotnet pack src/STRling/STRling.fsproj --configuration Release
            - name: Push to NuGet
              if: steps.check_nuget_fs.outputs.exists == 'false'
              working-directory: bindings/fsharp
              run: |
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    echo "DRY RUN: dotnet nuget push src/STRling/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json"
                  else
                    dotnet nuget push src/STRling/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_KEY }} --source https://api.nuget.org/v3/index.json
                  fi

    deploy-go:
        name: Deploy Go Release Tag
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
                  fetch-depth: 0
            - name: Check remote release tag
              id: check_tag
              run: |
                  VERSION="${{ needs.verify-release.outputs.tag_version }}"
                  RELEASE_TAG="v$VERSION"
                  if git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | grep -q "refs/tags/$RELEASE_TAG$"; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                    echo "Release already tagged: $RELEASE_TAG"
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                    echo "Release tag missing on origin: $RELEASE_TAG"
                  fi
            - name: Push release tag
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  VERSION="${{ needs.verify-release.outputs.tag_version }}"
                  RELEASE_TAG="v$VERSION"
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git tag "$RELEASE_TAG"

                  if [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]]; then
                    echo "DRY RUN: git push origin refs/tags/$RELEASE_TAG"
                    exit 0
                  fi

                  if git push origin "refs/tags/$RELEASE_TAG"; then
                    echo "Published release tag $RELEASE_TAG"
                  elif git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | grep -q "refs/tags/$RELEASE_TAG$"; then
                    echo "Release already tagged by a parallel job: $RELEASE_TAG"
                  else
                    echo "Failed to publish release tag $RELEASE_TAG"
                    exit 1
                  fi

    deploy-java:
        name: Deploy Java to Maven Central
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - name: Setup Python 3.10
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
            - name: Setup Java 11
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "11"
            - name: Check Maven Central registry
              id: check_maven
              working-directory: bindings/java
              run: |
                  VERSION=$(grep '<version>' pom.xml | head -1 | sed -e 's/.*<version>\(.*\)<\/version>.*/\1/')
                  echo "Checking Maven Central for com.strling:strling:$VERSION"
                  if python3 ../../tooling/check_version_exists.py --registry maven --group "com.strling" --package "strling" --version "$VERSION"; then
                     echo "exists=true" >> $GITHUB_OUTPUT
                     echo "Version $VERSION already exists on Maven Central. Skipping publish."
                  else
                     echo "exists=false" >> $GITHUB_OUTPUT
                     echo "Version $VERSION not found on Maven Central. Proceeding to publish."
                  fi
            - name: Build and deploy to Maven Central
              if: steps.check_maven.outputs.exists == 'false'
              working-directory: bindings/java
              env:
                  MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
                  GPG_KEY: ${{ secrets.GPG_KEY }}
              run: |
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    mvn deploy -DskipTests -Dgpg.skip=true -Dmaven.deploy.skip=true
                    echo "DRY RUN: mvn deploy"
                  else
                    mvn deploy -DskipTests -Dgpg.passphrase="${GPG_KEY}"
                  fi

    deploy-kotlin:
        name: Deploy Kotlin to Maven Central
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "11"
            - name: Check Maven Central registry
              id: check_maven_kt
              working-directory: bindings/kotlin
              run: |
                  # Extract version from build.gradle.kts: version = "3.0.0-alpha"
                  VERSION=$(grep "version =" build.gradle.kts | head -1 | cut -d '"' -f 2)
                  echo "Checking Maven Central for com.strling:strling-kotlin:$VERSION"
                  if python3 ../../tooling/check_version_exists.py --registry maven --group "com.strling" --package "strling-kotlin" --version "$VERSION"; then
                     echo "exists=true" >> $GITHUB_OUTPUT
                     echo "Version $VERSION already exists on Maven Central. Skipping publish."
                  else
                     echo "exists=false" >> $GITHUB_OUTPUT
                     echo "Version $VERSION not found on Maven Central. Proceeding to publish."
                  fi
            - name: Publish to Maven Central
              if: steps.check_maven_kt.outputs.exists == 'false'
              working-directory: bindings/kotlin
              env:
                  MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
                  ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_KEY }}
              run: |
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    ./gradlew publishToMavenLocal
                    echo "DRY RUN: ./gradlew publish"
                  else
                    ./gradlew publish
                  fi

    deploy-lua:
        name: Deploy Lua to LuaRocks
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - uses: leafo/gh-actions-lua@v12
            - uses: leafo/gh-actions-luarocks@v6
            - name: Resolve rockspec filename
              id: rockspec
              working-directory: bindings/lua
              run: |
                  ROCKSPEC=$(ls strling-*.rockspec | head -n 1)
                  if [[ -z "$ROCKSPEC" ]]; then
                    echo "No rockspec file found."
                    exit 1
                  fi
                  echo "file=$ROCKSPEC" >> $GITHUB_OUTPUT
            - name: Check LuaRocks registry
              id: check_luarocks
              working-directory: bindings/lua
              run: |
                  VERSION=$(grep "^version =" "${{ steps.rockspec.outputs.file }}" | cut -d '"' -f 2)
                  if python3 ../../tooling/check_version_exists.py --registry luarocks --package "strling" --version "$VERSION"; then
                     echo "exists=true" >> $GITHUB_OUTPUT
                     echo "Version $VERSION already exists on LuaRocks. Skipping publish."
                  else
                     echo "exists=false" >> $GITHUB_OUTPUT
                     echo "Version $VERSION not found on LuaRocks. Proceeding to publish."
                  fi
            - name: Upload to LuaRocks
              if: steps.check_luarocks.outputs.exists == 'false'
              working-directory: bindings/lua
              env:
                  LUAROCKS_API_KEY: ${{ secrets.LUA_API_KEY }}
              run: |
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    echo "DRY RUN: luarocks upload ${{ steps.rockspec.outputs.file }}"
                  else
                    luarocks upload "${{ steps.rockspec.outputs.file }}" --api-key=${LUAROCKS_API_KEY}
                  fi

    deploy-perl:
        name: Deploy Perl to CPAN
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - uses: shogo82148/actions-setup-perl@v1
            - name: Install Upload Tool
              run: cpanm App::cpanupload
            - name: Check CPAN registry
              id: check_cpan
              working-directory: bindings/perl
              run: |
                  VERSION=$(grep "\$VERSION =" lib/STRling.pm | cut -d "'" -f 2)
                  if python3 ../../tooling/check_version_exists.py --registry cpan --package "STRling" --version "$VERSION"; then
                     echo "exists=true" >> $GITHUB_OUTPUT
                     echo "Version $VERSION already exists on CPAN. Skipping publish."
                  else
                     echo "exists=false" >> $GITHUB_OUTPUT
                     echo "Version $VERSION not found on CPAN. Proceeding to publish."
                  fi
            - name: Upload to CPAN
              if: steps.check_cpan.outputs.exists == 'false'
              working-directory: bindings/perl
              env:
                  PAUSE_USERNAME: ${{ secrets.PAUSE_USERNAME }}
                  PAUSE_PASSWORD: ${{ secrets.PAUSE_PASSWORD }}
              run: |
                  # Assuming Makefile.PL or dist.ini exists and we can build a tarball
                  # For now, we'll assume a standard make dist
                  perl Makefile.PL
                  make dist
                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    echo "DRY RUN: cpan-upload -u $PAUSE_USERNAME *.tar.gz"
                  else
                    cpan-upload -u $PAUSE_USERNAME -p $PAUSE_PASSWORD *.tar.gz
