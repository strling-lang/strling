                    KOTLIN_VERSION=$(curl -fsSL "https://repo1.maven.org/maven2/com/strling/strling-kotlin/maven-metadata.xml" | tr -d '\n' | sed -n 's:.*<release>\([^<]*\)</release>.*:\1:p')

