        needs: [verify-release, deploy-csharp, deploy-fsharp]
        if: ${{ needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.deploy-csharp.result == 'success' && needs.deploy-fsharp.result == 'success' }}
        steps:
            - uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0"
            - name: Default Installation
              shell: bash
              run: |
                  set -euo pipefail
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"

                  for attempt in 1 2 3; do
                    CSHARP_DIR=$(mktemp -d)
                    pushd "$CSHARP_DIR" >/dev/null
                    dotnet new console --framework net9.0 --force >/dev/null
                    dotnet add package STRling >/tmp/verify-nuget-csharp.log 2>&1 || {
                      cat /tmp/verify-nuget-csharp.log
                      exit 1
                    }
                    CSHARP_VERSION=$(dotnet list package | awk '$2=="STRling" {print $NF; exit}')
                    popd >/dev/null

                    FSHARP_DIR=$(mktemp -d)
                    pushd "$FSHARP_DIR" >/dev/null
                    dotnet new console --language F# --framework net9.0 --force >/dev/null
                    dotnet add package STRling.FSharp >/tmp/verify-nuget-fsharp.log 2>&1 || {
                      cat /tmp/verify-nuget-fsharp.log
                      exit 1
                    }
                    FSHARP_VERSION=$(dotnet list package | awk '$2=="STRling.FSharp" {print $NF; exit}')
                    popd >/dev/null

                    echo "SSOT: $EXPECTED | C# Registry: $CSHARP_VERSION | F# Registry: $FSHARP_VERSION"
                    if [[ "$CSHARP_VERSION" == "$EXPECTED" && "$FSHARP_VERSION" == "$EXPECTED" ]]; then
                      exit 0
                    fi

                    if [[ "$attempt" -lt 3 ]]; then
                      echo "NuGet propagation delay suspected. Retrying in 100 seconds..."
                      sleep 100
                    fi
                  done

                  echo "NuGet is serving an outdated or incorrect version"
                  exit 1

    verify-pub-distributor:
        name: Verify Pub.dev Publication Status
        runs-on: ubuntu-latest
        needs: [verify-release, deploy-dart]
        if: ${{ needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.deploy-dart.result == 'success' }}
        steps:
            - uses: dart-lang/setup-dart@v1
            - name: Default Installation
              shell: bash
              run: |
                  set -euo pipefail
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"

                  for attempt in 1 2 3; do
                    WORKDIR=$(mktemp -d)
                    dart create --force --template=console-simple "$WORKDIR/app" >/dev/null
                    pushd "$WORKDIR/app" >/dev/null
                    dart pub add strling >/tmp/verify-pub.log 2>&1 || {
                      cat /tmp/verify-pub.log
                      exit 1
                    }
                    INSTALLED=$(awk '/^  strling:$/ {in_pkg=1; next} in_pkg && /version:/ {gsub(/"/, "", $2); print $2; exit}' pubspec.lock)
                    popd >/dev/null

                    echo "SSOT: $EXPECTED | Registry: $INSTALLED"
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then
                      exit 0
                    fi

                    if [[ "$attempt" -lt 3 ]]; then
                      echo "Pub.dev propagation delay suspected. Retrying in 100 seconds..."
                      sleep 100
                    fi
                  done

                  echo "Pub.dev is serving an outdated or incorrect version"
                  exit 1

    verify-pypi-distributor:
        name: Verify PyPI Publication Status
        runs-on: ubuntu-latest
        needs: [verify-release, deploy-python]
        if: ${{ needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.deploy-python.result == 'success' }}
        steps:
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
            - name: Default Installation
              shell: bash
              run: |
                  set -euo pipefail
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"

                  for attempt in 1 2 3; do
                    WORKDIR=$(mktemp -d)
                    python -m venv "$WORKDIR/.venv"
                    source "$WORKDIR/.venv/bin/activate"
                    python -m pip install --upgrade pip >/dev/null
                    python -m pip install strling >/tmp/verify-pypi.log 2>&1 || {
                      cat /tmp/verify-pypi.log
                      exit 1
                    }
                    INSTALLED=$(python -m pip show strling | awk -F': ' '/^Version:/{print $2; exit}')
                    deactivate

                    echo "SSOT: $EXPECTED | Registry: $INSTALLED"
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then
                      exit 0
                    fi

                    if [[ "$attempt" -lt 3 ]]; then
                      echo "PyPI propagation delay suspected. Retrying in 100 seconds..."
                      sleep 100
                    fi
                  done

                  echo "PyPI is serving an outdated or incorrect version"
                  exit 1

    verify-typescript-distributor:
        name: Verify NPM Publication Status
        runs-on: ubuntu-latest
        needs: [verify-release, deploy-typescript]
        if: ${{ needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.deploy-typescript.result == 'success' }}
        steps:
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
            - name: Default Installation
              shell: bash
              run: |
                  set -euo pipefail
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"

                  for attempt in 1 2 3; do
                    WORKDIR=$(mktemp -d)
                    pushd "$WORKDIR" >/dev/null
                    npm init -y >/dev/null 2>&1
                    npm install @strling-lang/strling >/tmp/verify-typescript.log 2>&1 || {
                      cat /tmp/verify-typescript.log
                      exit 1
                    }
                    INSTALLED=$(node -p "require('./node_modules/@strling-lang/strling/package.json').version")
                    popd >/dev/null

                    echo "SSOT: $EXPECTED | Registry: $INSTALLED"
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then
                      exit 0
                    fi

                    if [[ "$attempt" -lt 3 ]]; then
                      echo "NPM propagation delay suspected. Retrying in 100 seconds..."
                      sleep 100
                    fi
                  done

                  echo "NPM is serving an outdated or incorrect version"
                  exit 1
