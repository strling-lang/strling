                    INSTALLED=$(ruby -e "spec = Gem::Specification.find_by_name('strling'); puts spec.version")

                    echo "SSOT: $EXPECTED | Registry: $INSTALLED"
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then
