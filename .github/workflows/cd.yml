    deploy-php:
        name: Deploy PHP Release Tag
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
                  fetch-depth: 0
            - name: Check remote release tag
              id: check_tag
              working-directory: bindings/php
              run: |
                  VERSION="${{ needs.verify-release.outputs.tag_version }}"
                  FILE_VERSION=$(grep '"version":' composer.json | cut -d '"' -f 4)
                  RELEASE_TAG="v$VERSION"
                  echo "SSOT: $VERSION"
                  echo "PHP: $FILE_VERSION"
                  if [ "$VERSION" != "$FILE_VERSION" ]; then
                    echo "Version mismatch!"
                    exit 1
                  fi
                  if git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | grep -q "refs/tags/$RELEASE_TAG$"; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                    echo "Release already tagged: $RELEASE_TAG"
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                    echo "Release tag missing on origin: $RELEASE_TAG"
                  fi
            - name: Push release tag
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  VERSION="${{ needs.verify-release.outputs.tag_version }}"
                  RELEASE_TAG="v$VERSION"
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git tag "$RELEASE_TAG"

                  if [[ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]]; then
                    echo "DRY RUN: git push origin refs/tags/$RELEASE_TAG"
                    exit 0
                  fi

                  if git push origin "refs/tags/$RELEASE_TAG"; then
                    echo "Published release tag $RELEASE_TAG"
                  elif git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | grep -q "refs/tags/$RELEASE_TAG$"; then
                    echo "Release already tagged by a parallel job: $RELEASE_TAG"
                  else
                    echo "Failed to publish release tag $RELEASE_TAG"
                    exit 1
                  fi

    deploy-python:
        name: Deploy Python to PyPI
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - name: Setup Python 3.10
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
            - name: Check PyPI registry
              id: check_pypi
              working-directory: bindings/python
              run: |
                  pip install tomli
                  VERSION=$(python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])")
                  if python ../../tooling/check_version_exists.py --registry pypi --package "STRling" --version "$VERSION"; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                    echo "Version $VERSION already exists on PyPI. Skipping publish."
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                    echo "Version $VERSION not found on PyPI. Proceeding to publish."
                  fi
            - name: Install build tools and build package
              if: steps.check_pypi.outputs.exists == 'false'
              working-directory: bindings/python
              run: |
                  python -m pip install --upgrade pip build
                  python -m build
            - name: Publish package to PyPI
              if: steps.check_pypi.outputs.exists == 'false' && needs.verify-release.outputs.is_dry_run == 'false'
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: bindings/python/dist/
            - name: Dry Run PyPI (Metadata Check)
              if: steps.check_pypi.outputs.exists == 'false' && needs.verify-release.outputs.is_dry_run == 'true'
              working-directory: bindings/python
              run: |
                  pip install twine
                  twine check dist/*
                  echo "DRY RUN: PyPI publish would happen here"

    deploy-r:
        name: Deploy R (Tag Validation)
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - name: Verify Version Match
              working-directory: bindings/r
              run: |
                  TAG_VERSION="${{ needs.verify-release.outputs.tag_version }}"
                  # Extract version from DESCRIPTION: Version: 3.0.0-alpha
                  FILE_VERSION=$(grep 'Version:' DESCRIPTION | awk '{print $2}')
                  echo "Tag: $TAG_VERSION"
                  echo "File: $FILE_VERSION"
                  if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
                    echo "Version mismatch!"
                    exit 1
                  fi

    deploy-ruby:
