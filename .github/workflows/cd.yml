    deploy-typescript:
        name: Deploy TypeScript to NPM
        runs-on: ubuntu-latest
        needs: [verify-release]
        if: ${{ needs.verify-release.outputs.is_release == 'true' }}
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  ref: ${{ needs.verify-release.outputs.release_ref }}
            - name: Setup Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
            - name: Setup Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  registry-url: "https://registry.npmjs.org"
            - name: Check NPM registry
              id: check_npm
              working-directory: bindings/typescript
              run: |
                  PACKAGE_NAME="@strling-lang/strling"
                  CURRENT_VERSION=$(node -pe "require('./package.json').version")
                  if python ../../tooling/check_version_exists.py --registry npm --package "$PACKAGE_NAME" --version "$CURRENT_VERSION"; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                    echo "Version $CURRENT_VERSION already exists on NPM. Skipping publish."
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                    echo "Version $CURRENT_VERSION not found on NPM. Proceeding to publish."
                  fi
            - name: Install JS dependencies
              if: steps.check_npm.outputs.exists == 'false'
              working-directory: bindings/typescript
              run: npm ci
            - name: Build package
              if: steps.check_npm.outputs.exists == 'false'
              working-directory: bindings/typescript
              run: npm run build
            - name: Publish to NPM
              if: steps.check_npm.outputs.exists == 'false'
              working-directory: bindings/typescript
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  CURRENT_VERSION=$(node -pe "require('./package.json').version")
                  PUBLISH_TAG="latest"
                  if [[ "$CURRENT_VERSION" == *-* ]]; then
                    PUBLISH_TAG="${CURRENT_VERSION#*-}"
                  fi

                  if [ "${{ needs.verify-release.outputs.is_dry_run }}" == "true" ]; then
                    npm publish --dry-run --access public --tag "$PUBLISH_TAG"
                  else
                    npm publish --access public --tag "$PUBLISH_TAG"
                  fi

    # --- POST-DEPLOY DISTRIBUTOR VERIFICATION JOBS (ALPHABETICALLY ORDERED) ---

    verify-conan-distributor:
        name: Verify Conan Publication Status
        runs-on: ubuntu-latest
        needs: [verify-release, deploy-cpp]
        if: ${{ needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.deploy-cpp.result == 'success' }}
        steps:
            - name: Setup Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
            - name: Default Resolution and Validate Version vs SSOT
              shell: bash
              run: |
                  set -euo pipefail
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"
                  python -m pip install --upgrade pip conan >/dev/null

                  for attempt in 1 2 3; do
                    SEARCH_OUTPUT=$(conan search "strling/*" -r conancenter 2>/tmp/verify-conan.log) || {
                      cat /tmp/verify-conan.log
                      exit 1
                    }
                    INSTALLED=$(printf '%s\n' "$SEARCH_OUTPUT" | sed -n 's/.*strling\/\([^ #]*\).*/\1/p' | sort -V | tail -n 1)

                    echo "SSOT: $EXPECTED | Registry: $INSTALLED"
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then
                      exit 0
                    fi

                    if [[ "$attempt" -lt 3 ]]; then
                      echo "Conan propagation delay suspected. Retrying in 100 seconds..."
                      sleep 100
                    fi
                  done

                  echo "Conan is serving an outdated or incorrect strling version"
                  exit 1

    verify-cpan-distributor:
        name: Verify CPAN Publication Status
        runs-on: ubuntu-latest
        needs: [verify-release, deploy-perl]
        if: ${{ needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.deploy-perl.result == 'success' }}
        steps:
            - uses: shogo82148/actions-setup-perl@v1
            - name: Default Installation
              shell: bash
              run: |
                  set -euo pipefail
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"

                  for attempt in 1 2 3; do
                    cpanm --notest STRling >/tmp/verify-cpan.log 2>&1 || {
                      cat /tmp/verify-cpan.log
                      exit 1
                    }
                    INSTALLED=$(perl -MSTRling -e 'print $STRling::VERSION')

                    echo "SSOT: $EXPECTED | Registry: $INSTALLED"
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then
                      exit 0
                    fi

                    if [[ "$attempt" -lt 3 ]]; then
                      echo "CPAN propagation delay suspected. Retrying in 100 seconds..."
                      sleep 100
                    fi
                  done

                  echo "CPAN is serving an outdated or incorrect version"
                  exit 1

    verify-crates-distributor:
        name: Verify Crates.io Publication Status
        runs-on: ubuntu-latest
        needs: [verify-release, deploy-rust]
        if: ${{ needs.verify-release.outputs.is_release == 'true' && needs.verify-release.outputs.is_dry_run == 'false' && needs.deploy-rust.result == 'success' }}
        steps:
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: "1.65"
            - name: Default Installation
              shell: bash
              run: |
                  set -euo pipefail
                  EXPECTED="${{ needs.verify-release.outputs.tag_version }}"

                  for attempt in 1 2 3; do
                    cargo install strling --dry-run >/tmp/verify-crates.log 2>&1 || {
                      cat /tmp/verify-crates.log
                      exit 1
                    }
                    INSTALLED=$(sed -n 's/.*Installing strling v\([^ ]*\).*/\1/p' /tmp/verify-crates.log | head -n 1)
                    if [[ -z "$INSTALLED" ]]; then
                      INSTALLED=$(cargo search strling --limit 1 | sed -n 's/^strling = "\([^"]*\)".*/\1/p')
                    fi

                    echo "SSOT: $EXPECTED | Registry: $INSTALLED"
                    if [[ "$INSTALLED" == "$EXPECTED" ]]; then
                      exit 0
                    fi

                    if [[ "$attempt" -lt 3 ]]; then
                      echo "Crates.io propagation delay suspected. Retrying in 100 seconds..."
